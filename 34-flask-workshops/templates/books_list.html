{% extends 'base.html' %}
{% block content %}
<h2>Currently available books</h2>
<table class="table table-striped">
  <thead>
  <tr>
    <th>Title</th>
    <th>Author</th>
    <th>Quantity</th>
  </tr>
  </thead>
  <tbody>
  {% for book in books %}
  <tr>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.book_count }}</td>
  </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
